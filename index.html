<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>匠真 トレーニングログ</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232a78d6'/%3E%3Ctext x='50' y='62' font-size='48' text-anchor='middle' fill='white' font-family='sans-serif'%3E%F0%9F%8F%8B%3C/text%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
  :root {
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11,11,11,0.10);
    --series-1: #2a78d6; /* blue - 1RM */
    --series-2: #1baf7a; /* aqua - volume */
    --good: #0ca30c;
    --warning: #c98500;
    --critical: #d03b3b;
    --card-radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255,255,255,0.10);
      --series-1: #3987e5;
      --series-2: #199e70;
      --good: #0ca30c;
      --warning: #fab219;
      --critical: #e66767;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--page);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body { padding-bottom: 90px; }
  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    padding: max(14px, env(safe-area-inset-top)) 16px 12px;
  }
  header h1 { margin: 0; font-size: 17px; font-weight: 700; }
  header p { margin: 2px 0 0; font-size: 12px; color: var(--text-muted); }
  main { max-width: 560px; margin: 0 auto; padding: 16px; }
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .card h2 { margin: 0 0 12px; font-size: 14px; font-weight: 700; color: var(--text-primary); }
  label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600; }
  select, input[type=number], input[type=date], input[type=text] {
    width: 100%;
    font-size: 16px;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--page);
    color: var(--text-primary);
    margin-bottom: 14px;
    -webkit-appearance: none;
  }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .daytabs, .toptabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .daytabs button, .toptabs button {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--page); color: var(--text-secondary); font-size: 14px; font-weight: 700;
    cursor: pointer;
  }
  .daytabs button.active, .toptabs button.active {
    background: var(--series-1); color: #fff; border-color: var(--series-1);
  }
  .toptabs { position: sticky; top: 58px; z-index: 19; background: var(--page); padding-top: 4px; }
  .setrow { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .setrow .setnum { width: 26px; font-size: 13px; color: var(--text-muted); text-align: center; flex: none; }
  .setrow input { margin-bottom: 0; }
  .setrow .del {
    flex: none; width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--page); color: var(--critical); font-size: 16px; line-height: 1;
  }
  .addset {
    width: 100%; padding: 10px; border-radius: 10px; border: 1px dashed var(--baseline);
    background: transparent; color: var(--series-1); font-size: 14px; font-weight: 700; margin-bottom: 6px;
  }
  .savebtn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: var(--series-1); color: #fff; font-size: 16px; font-weight: 700;
  }
  .savebtn:disabled { opacity: 0.5; }
  details.rpe { margin-bottom: 14px; }
  details.rpe summary {
    font-size: 13px; color: var(--series-1); font-weight: 700; cursor: pointer; list-style: none;
  }
  details.rpe summary::-webkit-details-marker { display: none; }
  details.rpe summary:before { content: "Ⓘ  "; }
  .rpetable { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12.5px; }
  .rpetable td { padding: 6px 4px; border-bottom: 1px solid var(--grid); color: var(--text-secondary); }
  .rpetable td:first-child { font-weight: 700; color: var(--text-primary); width: 30px; }
  .targetcard { display: flex; gap: 12px; align-items: flex-start; }
  .targetcard .icon { font-size: 22px; }
  .targetcard .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .03em; }
  .targetcard .val { font-size: 20px; font-weight: 800; margin: 2px 0; }
  .targetcard .note { font-size: 12.5px; color: var(--text-secondary); }
  .muted-note { font-size: 12.5px; color: var(--text-muted); }
  .statustoast {
    position: fixed; left: 16px; right: 16px; bottom: 16px; z-index: 40;
    background: var(--text-primary); color: var(--surface-1);
    padding: 12px 16px; border-radius: 12px; font-size: 14px; text-align: center;
    opacity: 0; transform: translateY(10px); transition: all .25s ease; pointer-events: none;
  }
  .statustoast.show { opacity: 1; transform: translateY(0); }
  canvas { max-width: 100%; }
  .chartwrap { position: relative; height: 220px; margin-bottom: 6px; }
  table.hist { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 4px; }
  table.hist th { text-align: left; color: var(--text-muted); font-weight: 600; padding: 6px 4px; border-bottom: 1px solid var(--grid); }
  table.hist td { padding: 7px 4px; border-bottom: 1px solid var(--grid); color: var(--text-primary); font-variant-numeric: tabular-nums; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .pill.good { background: rgba(12,163,12,0.12); color: var(--good); }
  .pill.warn { background: rgba(201,133,0,0.14); color: var(--warning); }
  .empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px 10px; }
  .legend { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>

<header>
  <h1>🏋 濵田匠真 トレーニングログ</h1>
  <p>ウエイトトレーニング記録 &amp; ダッシュボード</p>
</header>

<main>
  <div class="toptabs">
    <button id="tab-record" class="active" onclick="switchTab('record')">記録する</button>
    <button id="tab-dash" onclick="switchTab('dash')">ダッシュボード</button>
  </div>

  <!-- ===================== 記録するタブ ===================== -->
  <div id="view-record">

    <div class="card">
      <h2>今日のメニュー</h2>
      <div class="daytabs">
        <button id="day-DAY1" class="active" onclick="setDay('DAY1')">DAY1</button>
        <button id="day-DAY2" onclick="setDay('DAY2')">DAY2</button>
      </div>

      <label for="dateInput">日付</label>
      <input type="date" id="dateInput">

      <label for="exerciseSelect">種目</label>
      <select id="exerciseSelect" onchange="onExerciseChange()"></select>

      <div id="absWrap" style="display:none;">
        <label for="absSelect">腹筋の種類</label>
        <select id="absSelect"></select>
      </div>
    </div>

    <div class="card" id="targetCardWrap" style="display:none;">
      <h2>前回の記録 ・ 次回の目標</h2>
      <div id="targetCardBody"></div>
    </div>

    <div class="card">
      <h2>セット記録</h2>

      <details class="rpe">
        <summary>RPEの目安を見る</summary>
        <table class="rpetable">
          <tr><td>10</td><td>これ以上1回もできない(全力)</td></tr>
          <tr><td>9</td><td>あと1回はできそう</td></tr>
          <tr><td>8</td><td>あと2回はできそう</td></tr>
          <tr><td>7</td><td>あと3回はできそう</td></tr>
          <tr><td>6以下</td><td>まだ余裕がある(ウォームアップ程度)</td></tr>
        </table>
      </details>

      <div class="legend"><span id="setsLegend" style="color:var(--text-muted)">重量(kg) ・ 回数 ・ RPE を入力</span></div>
      <div id="setsList"></div>
      <button class="addset" onclick="addSet()">＋ セットを追加</button>
    </div>

    <button class="savebtn" id="saveBtn" onclick="saveRecord()">この記録を保存する</button>
  </div>

  <!-- ===================== ダッシュボードタブ ===================== -->
  <div id="view-dash" style="display:none;">
    <div class="card">
      <h2>種目を選択</h2>
      <select id="dashExerciseSelect" onchange="renderDashboard()"></select>
    </div>

    <div class="card" id="dashTargetWrap" style="display:none;">
      <h2>次回の目標</h2>
      <div id="dashTargetBody"></div>
    </div>

    <div class="card">
      <h2 id="chart1Title">推定1RMの推移(Epley式)</h2>
      <div class="legend" id="chart1Legend"><span><i style="background:var(--series-1)"></i>推定1RM (kg)</span></div>
      <div class="chartwrap"><canvas id="chart1rm"></canvas></div>
    </div>

    <div class="card">
      <h2 id="chart2Title">総重量(ボリューム)の推移</h2>
      <div class="legend" id="chart2Legend"><span><i style="background:var(--series-2)"></i>総重量 (kg)</span></div>
      <div class="chartwrap"><canvas id="chartVolume"></canvas></div>
    </div>

    <div class="card">
      <h2>直近の記録</h2>
      <div id="histWrap"></div>
    </div>
  </div>
</main>

<div class="statustoast" id="toast"></div>

<script>
/* ============ 設定 ============ */
// Google Apps Script の Web アプリ URL をここに設定してください
const API_URL = "https://script.google.com/macros/s/AKfycbzNQbTzvuRuMN2tbMl6LNlnrJ7yinCRSMlsO6EX4YZROA2H-3Wli4XK1wRJFkJKEj5Klg/exec";

const EXERCISES = {
  DAY1: ["スクワット", "ベンチプレス", "懸垂", "ベントオーバーバーベルロー", "腹筋種目"],
  DAY2: ["デッドリフト", "ベントオーバーバーベルロー", "腹筋種目"]
};
const ABS_TYPES = ["オリジナル腹筋", "アブローラー(膝立ち)", "レッグレイズ", "プランク", "その他"];
const LOWER_BODY_EXERCISES = ["デッドリフト", "スクワット"]; // 重量アップ幅が大きい種目
const BODYWEIGHT_EXERCISES = ["腹筋種目"]; // 重量を扱わない自重種目
function isBodyweight(exercise) { return BODYWEIGHT_EXERCISES.includes(exercise); }

let currentDay = "DAY1";
let sets = []; // {weight, reps, rpe}
let allRecords = []; // API から取得した全記録
let loaded = false;

/* ============ 初期化 ============ */
function todayStr() {
  const d = new Date();
  const tz = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
  return tz.toISOString().slice(0, 10);
}

function init() {
  document.getElementById('dateInput').value = todayStr();
  populateExerciseSelect();
  populateAbsSelect();
  addSet();
  addSet();
  addSet();
  loadRecords();
}

function populateExerciseSelect() {
  const sel = document.getElementById('exerciseSelect');
  sel.innerHTML = '';
  EXERCISES[currentDay].forEach(ex => {
    const opt = document.createElement('option');
    opt.value = ex; opt.textContent = ex;
    sel.appendChild(opt);
  });
  onExerciseChange();
}

function populateAbsSelect() {
  const sel = document.getElementById('absSelect');
  sel.innerHTML = '';
  ABS_TYPES.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });
}

function setDay(day) {
  currentDay = day;
  document.getElementById('day-DAY1').classList.toggle('active', day === 'DAY1');
  document.getElementById('day-DAY2').classList.toggle('active', day === 'DAY2');
  populateExerciseSelect();
}

function onExerciseChange() {
  const ex = document.getElementById('exerciseSelect').value;
  document.getElementById('absWrap').style.display = (ex === '腹筋種目') ? 'block' : 'none';
  renderSets();
  renderTargetCard();
}

function switchTab(tab) {
  document.getElementById('tab-record').classList.toggle('active', tab === 'record');
  document.getElementById('tab-dash').classList.toggle('active', tab === 'dash');
  document.getElementById('view-record').style.display = (tab === 'record') ? 'block' : 'none';
  document.getElementById('view-dash').style.display = (tab === 'dash') ? 'block' : 'none';
  if (tab === 'dash') {
    populateDashExerciseSelect();
    renderDashboard();
  }
}

/* ============ セット入力 ============ */
function addSet() {
  sets.push({ weight: sets.length ? sets[sets.length-1].weight : '', reps: '', rpe: '' });
  renderSets();
}
function removeSet(i) {
  sets.splice(i, 1);
  renderSets();
}
function updateSet(i, field, value) {
  sets[i][field] = value;
}
function renderSets() {
  const wrap = document.getElementById('setsList');
  const exercise = document.getElementById('exerciseSelect').value;
  const bw = isBodyweight(exercise);
  const legendEl = document.getElementById('setsLegend');
  if (legendEl) legendEl.textContent = bw ? '回数 ・ RPE を入力(自重種目のため重量の入力は不要です)' : '重量(kg) ・ 回数 ・ RPE を入力';
  wrap.innerHTML = '';
  sets.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'setrow';
    row.innerHTML = `
      <div class="setnum">${i + 1}</div>
      ${bw ? '' : `<input type="number" inputmode="decimal" placeholder="重量kg" value="${s.weight}" step="0.5"
        onchange="updateSet(${i},'weight',this.value)">`}
      <input type="number" inputmode="numeric" placeholder="回数" value="${s.reps}"
        onchange="updateSet(${i},'reps',this.value)">
      <input type="number" inputmode="numeric" placeholder="RPE" value="${s.rpe}" step="0.5" min="1" max="10"
        onchange="updateSet(${i},'rpe',this.value)">
      <button class="del" onclick="removeSet(${i})">×</button>
    `;
    wrap.appendChild(row);
  });
}

/* ============ 保存 ============ */
async function saveRecord() {
  const date = document.getElementById('dateInput').value;
  const exercise = document.getElementById('exerciseSelect').value;
  const bw = isBodyweight(exercise);
  const note = (exercise === '腹筋種目') ? document.getElementById('absSelect').value : '';
  const validSets = sets.filter(s => (bw || s.weight !== '') && s.reps !== '');

  if (!validSets.length) {
    showToast(bw ? '回数を入力してください' : '重量と回数を入力してください');
    return;
  }
  const rows = validSets.map((s, i) => ({
    date, day: currentDay, exercise,
    setNumber: i + 1,
    weight: bw ? '' : Number(s.weight),
    reps: Number(s.reps),
    rpe: s.rpe === '' ? '' : Number(s.rpe),
    note
  }));

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    if (!API_URL || API_URL.indexOf('__') === 0) {
      throw new Error('APIが未設定です');
    }
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ rows }),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    });
    showToast('保存しました ✓');
    sets = [];
    addSet(); addSet(); addSet();
    await loadRecords();
    renderTargetCard();
  } catch (e) {
    showToast('保存に失敗しました: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'この記録を保存する';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

/* ============ データ取得 ============ */
async function loadRecords() {
  if (!API_URL || API_URL.indexOf('__') === 0) return;
  try {
    const res = await fetch(API_URL);
    const json = await res.json();
    allRecords = (json.records || []).map(r => ({
      ...r,
      weight: Number(r.weight) || 0,
      reps: Number(r.reps) || 0,
      rpe: r.rpe === '' || r.rpe === undefined ? null : Number(r.rpe),
      setNumber: Number(r.setNumber) || 0
    }));
    loaded = true;
    renderTargetCard();
  } catch (e) {
    console.log('loadRecords error', e);
  }
}

function epley1RM(weight, reps) {
  if (!weight || !reps) return 0;
  return weight * (1 + reps / 30);
}

function recordsFor(exercise) {
  return allRecords.filter(r => r.exercise === exercise);
}

function groupByDate(records) {
  const map = {};
  records.forEach(r => {
    if (!map[r.date]) map[r.date] = [];
    map[r.date].push(r);
  });
  return map;
}

function latestSessionSets(exercise) {
  const recs = recordsFor(exercise);
  if (!recs.length) return null;
  const byDate = groupByDate(recs);
  const dates = Object.keys(byDate).sort();
  const lastDate = dates[dates.length - 1];
  return { date: lastDate, sets: byDate[lastDate].sort((a,b) => a.setNumber - b.setNumber) };
}

/* ============ 次回目標ロジック ============ */
function computeNextTarget(exercise, lastSets) {
  if (!lastSets || !lastSets.length) return null;
  const rpes = lastSets.map(s => s.rpe).filter(v => v !== null && v !== undefined);
  const avgRpe = rpes.length ? rpes.reduce((a,b)=>a+b,0) / rpes.length : null;
  const highRpe = avgRpe !== null && avgRpe >= 9;
  const anyBelowMin = lastSets.some(s => s.reps < 8);

  if (isBodyweight(exercise)) {
    // 自重種目は重量ではなく回数(と負荷バリエーション)で進捗を測る
    const baseReps = Math.max(...lastSets.map(s => s.reps));
    const allHitTop = lastSets.every(s => s.reps >= 15);
    let status, repsTarget, comment;
    if (allHitTop && !highRpe) {
      status = 'good';
      repsTarget = `${baseReps + 3}回`;
      comment = `${baseReps}回を余裕でクリアしています。回数を+3回増やすか、より負荷の高いバリエーションに挑戦しましょう。`;
    } else if (anyBelowMin || highRpe) {
      status = 'warn';
      repsTarget = `${baseReps}回`;
      comment = 'きつい(RPE高め)セットがありました。同じ回数・同じバリエーションでフォームの安定を優先しましょう。';
    } else {
      status = 'good';
      repsTarget = `${baseReps + 1}〜${baseReps + 2}回`;
      comment = '良い強度です。同じバリエーションのまま、回数を1〜2回伸ばすことを目標にしましょう。';
    }
    return { status, bodyweight: true, repsTarget, sets: lastSets.length, comment };
  }

  const weights = lastSets.map(s => s.weight).filter(Boolean);
  const baseWeight = weights.length ? Math.max(...weights) : 0;
  const allHitTop = lastSets.every(s => s.reps >= 12);
  const inc = exercise === 'デッドリフト' ? 5 : 2.5;

  let status, weight, repsTarget, comment;
  if (allHitTop && !highRpe) {
    status = 'good';
    weight = baseWeight + inc;
    repsTarget = '8〜12回';
    comment = `全セットで12回を余裕でクリア。重量を +${inc}kg に上げましょう。`;
  } else if (anyBelowMin || highRpe) {
    status = 'warn';
    weight = baseWeight;
    repsTarget = '8〜12回';
    comment = '8回に届かない、またはきつい(RPE高め)セットがありました。同じ重量でフォームと回数の安定を優先しましょう。';
  } else {
    status = 'good';
    weight = baseWeight;
    repsTarget = '前回より多い回数';
    comment = '良い強度です。同じ重量のまま、回数を1〜2回伸ばすことを目標にしましょう。';
  }
  return { status, bodyweight: false, weight, repsTarget, sets: lastSets.length, comment };
}

function renderTargetCard() {
  const exercise = document.getElementById('exerciseSelect').value;
  const wrap = document.getElementById('targetCardWrap');
  const body = document.getElementById('targetCardBody');
  const last = latestSessionSets(exercise);
  if (!last) {
    if (loaded) {
      wrap.style.display = 'block';
      body.innerHTML = `<div class="muted-note">まだ「${exercise}」の記録がありません。今日の記録から始めましょう。</div>`;
    } else {
      wrap.style.display = 'none';
    }
    return;
  }
  const target = computeNextTarget(exercise, last.sets);
  const bwEx = isBodyweight(exercise);
  const prevSummary = last.sets.map(s => `${bwEx ? '' : s.weight + 'kg×'}${s.reps}回${s.rpe ? '(RPE'+s.rpe+')' : ''}`).join(' / ');
  const valText = target.bodyweight
    ? `${target.repsTarget} × ${target.sets}セット`
    : `${target.weight}kg × ${target.repsTarget} × ${target.sets}セット`;
  wrap.style.display = 'block';
  body.innerHTML = `
    <div class="muted-note" style="margin-bottom:10px;">前回(${last.date}): ${prevSummary}</div>
    <div class="targetcard">
      <div class="icon">${target.status === 'good' ? '💪' : '⚠️'}</div>
      <div>
        <div class="label">次回の目標</div>
        <div class="val">${valText}</div>
        <div class="note">${target.comment}</div>
      </div>
    </div>
  `;
}

/* ============ ダッシュボード ============ */
let chart1rmInstance = null;
let chartVolumeInstance = null;

function populateDashExerciseSelect() {
  const sel = document.getElementById('dashExerciseSelect');
  const current = sel.value;
  sel.innerHTML = '';
  const all = [...EXERCISES.DAY1, ...EXERCISES.DAY2].filter((v,i,a) => a.indexOf(v) === i);
  all.forEach(ex => {
    const opt = document.createElement('option');
    opt.value = ex; opt.textContent = ex;
    sel.appendChild(opt);
  });
  if (current && all.includes(current)) sel.value = current;
}

function renderDashboard() {
  const exercise = document.getElementById('dashExerciseSelect').value;
  const bwEx = isBodyweight(exercise);
  const recs = recordsFor(exercise);
  const byDate = groupByDate(recs);
  const dates = Object.keys(byDate).sort();

  const chart1Title = document.getElementById('chart1Title');
  const chart1Legend = document.getElementById('chart1Legend');
  const chart2Title = document.getElementById('chart2Title');
  const chart2Legend = document.getElementById('chart2Legend');

  let series1, series2;
  if (bwEx) {
    chart1Title.textContent = '総回数の推移';
    chart1Legend.innerHTML = `<span><i style="background:var(--series-1)"></i>総回数 (回)</span>`;
    chart2Title.textContent = '平均RPEの推移';
    chart2Legend.innerHTML = `<span><i style="background:var(--series-2)"></i>平均RPE</span>`;
    series1 = dates.map(d => byDate[d].reduce((sum, s) => sum + s.reps, 0));
    series2 = dates.map(d => {
      const rpes = byDate[d].map(s => s.rpe).filter(v => v !== null && v !== undefined);
      return rpes.length ? Math.round((rpes.reduce((a,b)=>a+b,0) / rpes.length) * 10) / 10 : 0;
    });
  } else {
    chart1Title.textContent = '推定1RMの推移(Epley式)';
    chart1Legend.innerHTML = `<span><i style="background:var(--series-1)"></i>推定1RM (kg)</span>`;
    chart2Title.textContent = '総重量(ボリューム)の推移';
    chart2Legend.innerHTML = `<span><i style="background:var(--series-2)"></i>総重量 (kg)</span>`;
    series1 = dates.map(d => {
      const best = Math.max(...byDate[d].map(s => epley1RM(s.weight, s.reps)));
      return Math.round(best * 10) / 10;
    });
    series2 = dates.map(d => byDate[d].reduce((sum, s) => sum + s.weight * s.reps, 0));
  }

  drawChart('chart1rm', 'chart1rmInstance', dates, series1, getCss('--series-1'));
  drawChart('chartVolume', 'chartVolumeInstance', dates, series2, getCss('--series-2'));

  // 次回目標
  const last = latestSessionSets(exercise);
  const dashWrap = document.getElementById('dashTargetWrap');
  const dashBody = document.getElementById('dashTargetBody');
  if (last) {
    const target = computeNextTarget(exercise, last.sets);
    const valText = target.bodyweight
      ? `${target.repsTarget} × ${target.sets}セット`
      : `${target.weight}kg × ${target.repsTarget} × ${target.sets}セット`;
    dashWrap.style.display = 'block';
    dashBody.innerHTML = `
      <div class="targetcard">
        <div class="icon">${target.status === 'good' ? '💪' : '⚠️'}</div>
        <div>
          <div class="label">次回の目標</div>
          <div class="val">${valText}</div>
          <div class="note">${target.comment}</div>
        </div>
      </div>`;
  } else {
    dashWrap.style.display = 'none';
  }

  // 履歴テーブル(直近8日分、新しい順)
  const histWrap = document.getElementById('histWrap');
  if (!dates.length) {
    histWrap.innerHTML = `<div class="empty">まだ記録がありません</div>`;
  } else {
    const recentDates = dates.slice(-8).reverse();
    let html;
    if (bwEx) {
      html = `<table class="hist"><tr><th>日付</th><th>記録</th><th>総回数</th><th>平均RPE</th></tr>`;
      recentDates.forEach(d => {
        const daySets = byDate[d].sort((a,b)=>a.setNumber-b.setNumber);
        const summary = daySets.map(s => `${s.reps}回${s.rpe ? '(RPE'+s.rpe+')' : ''}`).join(' / ');
        const totalReps = daySets.reduce((sum, s) => sum + s.reps, 0);
        const rpes = daySets.map(s => s.rpe).filter(v => v !== null && v !== undefined);
        const avgRpe = rpes.length ? Math.round((rpes.reduce((a,b)=>a+b,0) / rpes.length) * 10) / 10 : '-';
        html += `<tr><td>${d}</td><td>${summary}</td><td>${totalReps}回</td><td>${avgRpe}</td></tr>`;
      });
    } else {
      html = `<table class="hist"><tr><th>日付</th><th>記録</th><th>総重量</th><th>推定1RM</th></tr>`;
      recentDates.forEach(d => {
        const daySets = byDate[d].sort((a,b)=>a.setNumber-b.setNumber);
        const summary = daySets.map(s => `${s.weight}×${s.reps}${s.rpe ? '(RPE'+s.rpe+')' : ''}`).join(' / ');
        const vol = daySets.reduce((sum, s) => sum + s.weight * s.reps, 0);
        const best1rm = Math.round(Math.max(...daySets.map(s => epley1RM(s.weight, s.reps))) * 10) / 10;
        html += `<tr><td>${d}</td><td>${summary}</td><td>${vol}kg</td><td>${best1rm}kg</td></tr>`;
      });
    }
    html += `</table>`;
    histWrap.innerHTML = html;
  }
}

function getCss(varName) {
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

function drawChart(canvasId, instanceVarName, labels, data, color) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  const existing = (instanceVarName === 'chart1rmInstance') ? chart1rmInstance : chartVolumeInstance;
  if (existing) existing.destroy();

  const gridColor = getCss('--grid');
  const textColor = getCss('--text-muted');

  const newChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        borderColor: color,
        backgroundColor: color,
        borderWidth: 2,
        pointRadius: labels.length > 20 ? 0 : 4,
        pointBackgroundColor: color,
        tension: 0.25,
        fill: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: textColor, maxRotation: 0, autoSkip: true, font: {size: 10} } },
        y: { grid: { color: gridColor }, ticks: { color: textColor, font: {size: 10} }, beginAtZero: false }
      }
    }
  });

  if (instanceVarName === 'chart1rmInstance') chart1rmInstance = newChart;
  else chartVolumeInstance = newChart;

  if (!labels.length) {
    // 空データ時のプレースホルダ
  }
}

init();
</script>
</body>
</html>
